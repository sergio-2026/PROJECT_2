<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Giga Pet</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Giga Pet</h1>
      <p>
        Use the buttons to take care of your pet. Careful not overfeed or underfeed it, and make sure to give it enough play and rest!
      </p>
    </header>

    <main>
      <div class="pet-wrapper">
        <div class="pet-image-container">
          <!-- 8 Make sure to change the provided image to a new image of your choosing. -->
          <img
            src="images/dog-happy.png"
            alt="Cartoon dog named Mr Bean"
            class="pet-image"
          />
        </div>

        <div class="dashboard">
          <p><span class="bold">Name:</span> <span class="name"></span></p>
          <p><span class="bold">Weight:</span> <span class="weight"></span></p>
          <p>
            <span class="bold">Happiness:</span>
            <span class="happiness"></span>
          </p>
          <p><span class="bold">Energy:</span> <span class="energy"></span></p>

          <div class="button-container">
            <button class="treat-button">Treat</button>
            <button class="play-button">Play</button>
            <button class="exercise-button">Exercise</button>
            <!-- 4 Add a new action button -->
            <button class="nap-button">Nap</button>
          </div>

          <!-- 6 Add a visual notification after each button press with a comment from your pet. -->
          <p class="pet-comment"></p>
        </div>
      </div>
    </main>

    <footer>Project Gigapet JavaScript — COMP 484</footer>

    <!-- jQuery must load before script.js -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
