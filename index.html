<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Project Gigapet JavaScript</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1> Giga Pet</h1>
    <p> Use the buttons to take care of your pet. Watch the happiness and weight change as you interact.</p>
  </header>

  <main>
    <div class="pet-image-container">
      <!-- 9. Make sure to change the provided image to a new image of your choosing. -->
      <img class="pet-image" src="img/my-gigapet.png" alt="My Giga Pet">
    </div>

    <div class="dashboard">
      <div>Name: <span class="name"></span></div>
      <div>Weight: <span class="weight"></span></div>
      <div>Happiness: <span class="happiness"></span></div>

      <!-- 5. Add a new behavior that correlates with the new button you added. You can add it below the happiness text in the html -->
      <div>Energy: <span class="energy"></span></div>

      <!-- 6. Add a visual notification after each button press with a comment from your pet. For this requirement you can not use console.log() or alert(). -->
      <p class="pet-comment"></p>

      <div class="button-container">
        <button class="treat-button">Treat</button>
        <button class="play-button">Play</button>
        <button class="exercise-button">Exercise</button>

        <!-- 4. Add a new action button -->
        <button class="nap-button">Nap</button>
      </div>
    </div>
  </main>

  <footer>
    <p>Project Gigapet JavaScript for COMP 484 by Sergio Ruelas</p>
  </footer>

  <!-- jQuery library (needed for the starter code and jQuery methods) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
